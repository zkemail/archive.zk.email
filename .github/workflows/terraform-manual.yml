name: Manual Terraform Operations

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: 'Type "DESTROY" to confirm destruction (required for destroy action)'
        required: false
        type: string

env:
  TF_VERSION: '1.5.0'
  TF_WORKING_DIR: './terraform'
  DEPLOY_HOST: 34.145.87.6
  DEPLOY_INSTANCE: dkimreg-key-populator
  DEPLOY_USER: olof_andersson
  DEPLOY_REPO_DIR: /home/olof_andersson/archive.prove.email
  DEPLOY_SERVICE: archive-prove-email
  DEPLOY_ARTIFACT: /tmp/archive-prove-email-standalone.tgz
  DEPLOY_REMOTE_ARTIFACT: /home/olof_andersson/archive-prove-email-standalone.tgz

jobs:
  terraform-manual:
    name: 'Manual Terraform Operation'
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'pull_request' && 'Preview' || 'Production' }}
    
    steps:
    - name: Validate Destroy Confirmation
      if: github.event.inputs.action == 'destroy'
      run: |
        if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
          echo "❌ Destroy confirmation required. Please type 'DESTROY' in the confirm_destroy input."
          exit 1
        fi
        echo "✅ Destroy confirmation validated"

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v2

    - name: Terraform Format Check
      id: fmt
      run: terraform fmt -check -recursive
      working-directory: ${{ env.TF_WORKING_DIR }}
      continue-on-error: true

    - name: Terraform Init
      run: terraform init
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Select Terraform Workspace
      id: workspace
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          WORKSPACE="pr-validation"
          echo "workspace=pr-validation" >> $GITHUB_OUTPUT
        else
          WORKSPACE="main"
          echo "workspace=main" >> $GITHUB_OUTPUT
        fi
        
        echo "Selecting workspace: $WORKSPACE"
        terraform workspace select $WORKSPACE || terraform workspace new $WORKSPACE
        
        echo "Current workspace:"
        terraform workspace show
        
        echo "## 🏗️ Workspace Information" >> $GITHUB_STEP_SUMMARY
        echo "**Selected Workspace:** $WORKSPACE" >> $GITHUB_STEP_SUMMARY
        echo "**Operation Type:** ${{ github.event.inputs.action }}" >> $GITHUB_STEP_SUMMARY
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Terraform Plan
      if: github.event.inputs.action == 'plan'
      run: |
        echo "## 📋 Terraform Plan (Workspace: ${{ steps.workspace.outputs.workspace }})" >> $GITHUB_STEP_SUMMARY
        terraform plan -no-color -input=false \
          -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
          -var="region=${{ secrets.GCP_REGION }}" \
          -var="environment=${{ secrets.ENVIRONMENT }}" \
          -var="archive_service_account_email=${{ secrets.ARCHIVE_SERVICE_ACCOUNT_EMAIL }}" \
          | tee plan_output.txt
        
        echo "\`\`\`terraform" >> $GITHUB_STEP_SUMMARY
        cat plan_output.txt >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Terraform Apply
      if: github.event.inputs.action == 'apply'
      run: |
        echo "## 🚀 Terraform Apply (Workspace: ${{ steps.workspace.outputs.workspace }})" >> $GITHUB_STEP_SUMMARY
        terraform apply -auto-approve -input=false \
          -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
          -var="region=${{ secrets.GCP_REGION }}" \
          -var="environment=${{ secrets.ENVIRONMENT }}" \
          -var="archive_service_account_email=${{ secrets.ARCHIVE_SERVICE_ACCOUNT_EMAIL }}" \
          | tee apply_output.txt
        
        echo "✅ Infrastructure successfully applied in workspace: ${{ steps.workspace.outputs.workspace }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Outputs:" >> $GITHUB_STEP_SUMMARY
        
        # Get and display outputs
        terraform output -json > outputs.json
        echo "- **Workspace:** ${{ steps.workspace.outputs.workspace }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Project ID:** $(terraform output -raw GOOGLE_CLOUD_PROJECT_ID)" >> $GITHUB_STEP_SUMMARY
        echo "- **Region:** $(terraform output -raw GOOGLE_CLOUD_REGION)" >> $GITHUB_STEP_SUMMARY
        echo "- **Queue Name:** $(terraform output -raw CLOUD_TASKS_QUEUE_NAME)" >> $GITHUB_STEP_SUMMARY
        echo "- **Function URL:** $(terraform output -raw CLOUD_FUNCTION_URL)" >> $GITHUB_STEP_SUMMARY
        echo "- **Service Account:** $(terraform output -raw TASKS_SERVICE_ACCOUNT_EMAIL)" >> $GITHUB_STEP_SUMMARY
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Terraform Destroy Plan
      if: github.event.inputs.action == 'destroy'
      run: |
        echo "## ⚠️ Terraform Destroy Plan (Workspace: ${{ steps.workspace.outputs.workspace }})" >> $GITHUB_STEP_SUMMARY
        terraform plan -destroy -no-color -input=false \
          -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
          -var="region=${{ secrets.GCP_REGION }}" \
          -var="environment=${{ secrets.ENVIRONMENT }}" \
          -var="archive_service_account_email=${{ secrets.ARCHIVE_SERVICE_ACCOUNT_EMAIL }}" \
          | tee destroy_plan.txt
        
        echo "\`\`\`terraform" >> $GITHUB_STEP_SUMMARY
        cat destroy_plan.txt >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      run: |
        echo "## 💥 Terraform Destroy (Workspace: ${{ steps.workspace.outputs.workspace }})" >> $GITHUB_STEP_SUMMARY
        terraform destroy -auto-approve -input=false \
          -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
          -var="region=${{ secrets.GCP_REGION }}" \
          -var="environment=${{ secrets.ENVIRONMENT }}" \
          -var="archive_service_account_email=${{ secrets.ARCHIVE_SERVICE_ACCOUNT_EMAIL }}" \
          | tee destroy_output.txt
        
        echo "💥 Infrastructure successfully destroyed in workspace: ${{ steps.workspace.outputs.workspace }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "⚠️ **All resources in workspace '${{ steps.workspace.outputs.workspace }}' have been removed from GCP**" >> $GITHUB_STEP_SUMMARY
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Save Terraform Outputs to File
      id: save_outputs
      if: github.event.inputs.action == 'apply'
      run: |
        # Create outputs directory
        mkdir -p outputs
        
        # Get terraform outputs and save to file
        terraform output -json > outputs/terraform_outputs.json
        
        # Verify file was created and contains data
        if [ -s outputs/terraform_outputs.json ]; then
          echo "✅ Terraform outputs saved successfully for workspace: ${{ steps.workspace.outputs.workspace }}"
          echo "outputs_saved=true" >> $GITHUB_OUTPUT
          echo "workspace=${{ steps.workspace.outputs.workspace }}" >> $GITHUB_OUTPUT
        else
          echo "❌ Failed to save terraform outputs"
          echo "outputs_saved=false" >> $GITHUB_OUTPUT
          exit 1
        fi
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Upload Terraform Outputs
      if: github.event.inputs.action == 'apply'
      uses: actions/upload-artifact@v4
      with:
        name: terraform-outputs-${{ steps.workspace.outputs.workspace }}
        path: terraform/outputs/terraform_outputs.json
        retention-days: 1

    - name: Setup pnpm
      if: github.event.inputs.action == 'apply' && steps.workspace.outputs.workspace == 'main'
      uses: pnpm/action-setup@v4
      with:
        version: 9.15.9
        run_install: false

    - name: Setup Node.js
      if: github.event.inputs.action == 'apply' && steps.workspace.outputs.workspace == 'main'
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm

    - name: Install App Dependencies
      if: github.event.inputs.action == 'apply' && steps.workspace.outputs.workspace == 'main'
      run: pnpm install --frozen-lockfile

    - name: Build VM App Artifact
      if: github.event.inputs.action == 'apply' && steps.workspace.outputs.workspace == 'main'
      env:
        POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
        POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
        WITNESS_API_KEY: ${{ secrets.WITNESS_API_KEY }}
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
        NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
        NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        CRON_SECRET: ${{ secrets.CRON_SECRET }}
        NEXT_TELEMETRY_DISABLED: "1"
      run: |
        for value_name in \
          POSTGRES_PRISMA_URL \
          POSTGRES_URL_NON_POOLING \
          WITNESS_API_KEY \
          GOOGLE_CLIENT_ID \
          GOOGLE_CLIENT_SECRET \
          GOOGLE_REDIRECT_URI \
          NEXTAUTH_SECRET \
          NEXTAUTH_URL \
          CRON_SECRET; do
          if [ -z "${!value_name}" ]; then
            echo "Value for $value_name is empty"
            exit 1
          fi
        done

        pnpm exec prisma generate --generator client_js
        pnpm exec prisma migrate deploy
        pnpm exec next build

        if [ ! -f .next/standalone/server.js ]; then
          echo "Next.js standalone build did not produce .next/standalone/server.js"
          exit 1
        fi

        rm -rf /tmp/archive-prove-email-artifact
        mkdir -p /tmp/archive-prove-email-artifact/.next
        cp -a .next/standalone /tmp/archive-prove-email-artifact/.next/standalone
        mkdir -p /tmp/archive-prove-email-artifact/.next/standalone/.next
        cp -a .next/static /tmp/archive-prove-email-artifact/.next/standalone/.next/static

        if [ -d public ]; then
          cp -a public /tmp/archive-prove-email-artifact/.next/standalone/public
        fi

        tar -C /tmp/archive-prove-email-artifact -czf "${{ env.DEPLOY_ARTIFACT }}" .next/standalone
        ls -lh "${{ env.DEPLOY_ARTIFACT }}"

    - name: Prepare VM SSH
      if: github.event.inputs.action == 'apply' && steps.workspace.outputs.workspace == 'main'
      run: |
        install -m 700 -d ~/.ssh
        printf '%s\n' "${{ secrets.DKIMREG_VM_SSH_PRIVATE_KEY }}" > ~/.ssh/dkimreg_vm
        chmod 600 ~/.ssh/dkimreg_vm
        ssh-keyscan -H "${{ env.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

    - name: Update VM App on Apply
      if: github.event.inputs.action == 'apply' && steps.workspace.outputs.workspace == 'main'
      run: |
        echo "## Updating VM Runtime Environment" >> $GITHUB_STEP_SUMMARY
        echo "Updating VM runtime environment from workspace: ${{ steps.workspace.outputs.workspace }}" >> $GITHUB_STEP_SUMMARY
        
        cd ${{ env.TF_WORKING_DIR }}

        GOOGLE_CLOUD_PROJECT_ID="$(terraform output -raw GOOGLE_CLOUD_PROJECT_ID)"
        GOOGLE_CLOUD_REGION="$(terraform output -raw GOOGLE_CLOUD_REGION)"
        CLOUD_TASKS_QUEUE_NAME="$(terraform output -raw CLOUD_TASKS_QUEUE_NAME)"
        CLOUD_FUNCTION_URL="$(terraform output -raw CLOUD_FUNCTION_URL)"
        TASKS_SERVICE_ACCOUNT_EMAIL="$(terraform output -raw TASKS_SERVICE_ACCOUNT_EMAIL)"

        for value_name in \
          GOOGLE_CLOUD_PROJECT_ID \
          GOOGLE_CLOUD_REGION \
          CLOUD_TASKS_QUEUE_NAME \
          CLOUD_FUNCTION_URL \
          TASKS_SERVICE_ACCOUNT_EMAIL; do
          if [ -z "${!value_name}" ] || [ "${!value_name}" = "null" ]; then
            echo "Value for $value_name is empty or null"
            echo "- $value_name: value is empty or null" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        done

        cat > /tmp/archive-prove-email.runtime.env <<EOF
        GOOGLE_CLOUD_PROJECT_ID=$GOOGLE_CLOUD_PROJECT_ID
        GOOGLE_CLOUD_REGION=$GOOGLE_CLOUD_REGION
        CLOUD_TASKS_QUEUE_NAME=$CLOUD_TASKS_QUEUE_NAME
        CLOUD_FUNCTION_URL=$CLOUD_FUNCTION_URL
        TASKS_SERVICE_ACCOUNT_EMAIL=$TASKS_SERVICE_ACCOUNT_EMAIL
        EOF

        scp -i ~/.ssh/dkimreg_vm /tmp/archive-prove-email.runtime.env \
          "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/home/${{ env.DEPLOY_USER }}/archive-prove-email.runtime.env"

        scp -i ~/.ssh/dkimreg_vm "${{ env.DEPLOY_ARTIFACT }}" \
          "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_REMOTE_ARTIFACT }}"

        ssh -i ~/.ssh/dkimreg_vm "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" \
          "set -euo pipefail; cd '${{ env.DEPLOY_REPO_DIR }}'; git fetch origin; git pull --ff-only origin main; REPO_DIR='${{ env.DEPLOY_REPO_DIR }}' SERVICE_NAME='${{ env.DEPLOY_SERVICE }}' BRANCH='main' ARTIFACT_PATH='${{ env.DEPLOY_REMOTE_ARTIFACT }}' bash '${{ env.DEPLOY_REPO_DIR }}/deployment/deploy-gce.sh'"

        echo "- VM app deployment completed on ${{ env.DEPLOY_INSTANCE }}" >> $GITHUB_STEP_SUMMARY

    - name: Skip VM Update for Non-Main Workspace
      if: github.event.inputs.action == 'apply' && steps.workspace.outputs.workspace != 'main'
      run: |
        echo "## VM Update Skipped" >> $GITHUB_STEP_SUMMARY
        echo "VM runtime environment is only updated from the 'main' workspace." >> $GITHUB_STEP_SUMMARY
        echo "Current workspace: ${{ steps.workspace.outputs.workspace }}" >> $GITHUB_STEP_SUMMARY
        echo "To update the VM app, run this action from the main branch or switch to the 'main' workspace." >> $GITHUB_STEP_SUMMARY

    - name: Operation Summary
      if: always()
      run: |
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "**Operation:** ${{ github.event.inputs.action }}" >> $GITHUB_STEP_SUMMARY
        echo "**Workspace:** ${{ steps.workspace.outputs.workspace }}" >> $GITHUB_STEP_SUMMARY
        echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "**Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
        echo "**Backend:** GCS (terraform-state-archive-dev)" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ github.event.inputs.action }}" = "destroy" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **WARNING:** All GCP resources in workspace '${{ steps.workspace.outputs.workspace }}' have been destroyed." >> $GITHUB_STEP_SUMMARY
          echo "You will need to run 'apply' to recreate the infrastructure in this workspace." >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ github.event.inputs.action }}" = "apply" ] && [ "${{ steps.workspace.outputs.workspace }}" = "main" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**VM Integration:** Runtime environment updated and deployment completed" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ github.event.inputs.action }}" = "apply" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**VM Integration:** Skipped (only runs for 'main' workspace)" >> $GITHUB_STEP_SUMMARY
        fi
