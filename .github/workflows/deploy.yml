name: Deploy Infrastructure and VM App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  TF_VERSION: '1.5.0'
  TF_WORKING_DIR: './terraform'
  DEPLOY_HOST: 34.145.87.6
  DEPLOY_INSTANCE: dkimreg-key-populator
  DEPLOY_USER: olof_andersson
  DEPLOY_REPO_DIR: /home/olof_andersson/archive.prove.email
  DEPLOY_SERVICE: archive-prove-email

jobs:
  deploy:
    name: 'Deploy Infrastructure and VM App'
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'pull_request' && 'Preview' || 'Production' }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v2

    - name: Terraform Format Check
      id: fmt
      run: terraform fmt -check -recursive
      working-directory: ${{ env.TF_WORKING_DIR }}
      continue-on-error: true

    - name: Terraform Init
      id: init
      run: terraform init
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Select Terraform Workspace
      id: workspace
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          WORKSPACE="pr-validation"
          echo "workspace=pr-validation" >> $GITHUB_OUTPUT
        else
          WORKSPACE="main"
          echo "workspace=main" >> $GITHUB_OUTPUT
        fi
        
        echo "Selecting workspace: $WORKSPACE"
        terraform workspace select $WORKSPACE || terraform workspace new $WORKSPACE
        
        echo "Current workspace:"
        terraform workspace show
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Terraform Plan
      id: plan
      run: |
        terraform plan -no-color -input=false \
          -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
          -var="region=${{ secrets.GCP_REGION }}" \
          -var="environment=${{ secrets.ENVIRONMENT }}" \
          -var="archive_service_account_email=${{ secrets.ARCHIVE_SERVICE_ACCOUNT_EMAIL }}"
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Terraform Apply
      id: apply
      run: |
        terraform apply -auto-approve -input=false \
          -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
          -var="region=${{ secrets.GCP_REGION }}" \
          -var="environment=${{ secrets.ENVIRONMENT }}" \
          -var="archive_service_account_email=${{ secrets.ARCHIVE_SERVICE_ACCOUNT_EMAIL }}"
      working-directory: ${{ env.TF_WORKING_DIR }}

    - name: Prepare VM SSH
      if: github.event_name == 'push'
      run: |
        install -m 700 -d ~/.ssh
        printf '%s\n' "${{ secrets.DKIMREG_VM_SSH_PRIVATE_KEY }}" > ~/.ssh/dkimreg_vm
        chmod 600 ~/.ssh/dkimreg_vm
        ssh-keyscan -H "${{ env.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

    - name: Write Terraform Runtime Environment
      if: github.event_name == 'push'
      run: |
        cd ${{ env.TF_WORKING_DIR }}

        OUTPUTS_JSON=$(terraform output -json)

        GOOGLE_CLOUD_PROJECT_ID=$(echo "$OUTPUTS_JSON" | jq -r '.GOOGLE_CLOUD_PROJECT_ID.value')
        GOOGLE_CLOUD_REGION=$(echo "$OUTPUTS_JSON" | jq -r '.GOOGLE_CLOUD_REGION.value')
        CLOUD_TASKS_QUEUE_NAME=$(echo "$OUTPUTS_JSON" | jq -r '.CLOUD_TASKS_QUEUE_NAME.value')
        CLOUD_FUNCTION_URL=$(echo "$OUTPUTS_JSON" | jq -r '.CLOUD_FUNCTION_URL.value')
        TASKS_SERVICE_ACCOUNT_EMAIL=$(echo "$OUTPUTS_JSON" | jq -r '.TASKS_SERVICE_ACCOUNT_EMAIL.value')

        for value_name in \
          GOOGLE_CLOUD_PROJECT_ID \
          GOOGLE_CLOUD_REGION \
          CLOUD_TASKS_QUEUE_NAME \
          CLOUD_FUNCTION_URL \
          TASKS_SERVICE_ACCOUNT_EMAIL; do
          if [ -z "${!value_name}" ] || [ "${!value_name}" = "null" ]; then
            echo "Value for $value_name is empty or null"
            exit 1
          fi
        done

        cat > /tmp/archive-prove-email.runtime.env <<EOF
        GOOGLE_CLOUD_PROJECT_ID=$GOOGLE_CLOUD_PROJECT_ID
        GOOGLE_CLOUD_REGION=$GOOGLE_CLOUD_REGION
        CLOUD_TASKS_QUEUE_NAME=$CLOUD_TASKS_QUEUE_NAME
        CLOUD_FUNCTION_URL=$CLOUD_FUNCTION_URL
        TASKS_SERVICE_ACCOUNT_EMAIL=$TASKS_SERVICE_ACCOUNT_EMAIL
        EOF

        scp -i ~/.ssh/dkimreg_vm /tmp/archive-prove-email.runtime.env \
          "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/home/${{ env.DEPLOY_USER }}/archive-prove-email.runtime.env"

    - name: Deploy VM App
      if: github.event_name == 'push'
      run: |
        ssh -i ~/.ssh/dkimreg_vm "${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}" \
          "set -euo pipefail; cd '${{ env.DEPLOY_REPO_DIR }}'; git fetch origin; git pull --ff-only origin main; REPO_DIR='${{ env.DEPLOY_REPO_DIR }}' SERVICE_NAME='${{ env.DEPLOY_SERVICE }}' BRANCH='main' bash '${{ env.DEPLOY_REPO_DIR }}/deployment/deploy-gce.sh'"

    - name: Cleanup
      if: always()
      run: |
        rm -f /tmp/archive-prove-email.runtime.env
        echo "Temporary files cleaned up"

    - name: Deployment Summary
      if: always()
      run: |
        echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- Terraform infrastructure updated in workspace: ${{ steps.workspace.outputs.workspace }}" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ job.status }}" = "success" ]; then
          echo "- VM app deployment completed on ${{ env.DEPLOY_INSTANCE }}" >> $GITHUB_STEP_SUMMARY
        else
          echo "- VM app deployment failed or was skipped" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Status:" >> $GITHUB_STEP_SUMMARY
        echo "- Render API deployment is no longer used by this workflow" >> $GITHUB_STEP_SUMMARY
